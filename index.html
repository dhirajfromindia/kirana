<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>सीताराम</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    padding:16px;
    padding-bottom:130px;
    background:
        linear-gradient(
            180deg,
            #f8fafc 0%,
            #eef2ff 100%
        );
    font-family:'Poppins',sans-serif;
    color:#0f172a;
}

/* HEADER */

.header{
    text-align:center;
    font-size:36px;
    font-weight:800;
    color:#f97316;
    margin-top:4px;
}

.sub{
    text-align:center;
    color:#64748b;
    font-size:13px;
    margin-bottom:20px;
}

/* INPUT BOX */

.input-box{
    background:white;
    border-radius:26px;
    padding:16px;
    box-shadow:
        0 10px 30px rgba(99,102,241,0.10);
    border:1px solid #e2e8f0;
}

textarea{
    width:100%;
    height:110px;
    border:none;
    outline:none;
    resize:none;
    border-radius:18px;
    background:#f8fafc;
    padding:16px;
    font-size:15px;
    color:#111827;
    line-height:1.6;
    font-family:'Poppins',sans-serif;
}

/* DYNAMIC SUGGESTIONS */

.suggestions{
    display:flex;
    gap:8px;
    overflow:auto;
    margin-top:14px;
    padding-bottom:4px;
}

.suggestions::-webkit-scrollbar{
    display:none;
}

.suggestion{
    flex:none;
    padding:9px 14px;
    border-radius:999px;
    background:
        linear-gradient(
            135deg,
            #eef2ff,
            #e0e7ff
        );
    color:#4338ca;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    cursor:pointer;
    border:1px solid #c7d2fe;
}

/* BUTTON */

.add-btn{
    width:100%;
    margin-top:16px;
    border:none;
    border-radius:18px;
    padding:16px;
    font-size:15px;
    font-weight:700;
    color:white;
    background:
        linear-gradient(
            135deg,
            #4f46e5,
            #7c3aed
        );
    box-shadow:
        0 10px 24px rgba(79,70,229,0.30);
}

/* SUMMARY */

.summary{
    margin-top:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 4px;
    color:#4338ca;
    font-weight:700;
}

/* TABLE HEADER */

.table-header{
    display:none;
    margin-top:16px;
    background:
        linear-gradient(
            135deg,
            #4338ca,
            #6d28d9
        );
    color:white;
    padding:14px 16px;
    border-radius:20px;
    box-shadow:
        0 8px 20px rgba(67,56,202,0.25);
}

.header-top,
.header-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-top{
    font-size:13px;
    font-weight:700;
}

.header-bottom{
    margin-top:7px;
    font-size:11px;
    opacity:0.9;
}

/* CARD */

.card{
    margin-top:14px;
    background:white;
    border-radius:24px;
    padding:16px;
    box-shadow:
        0 8px 24px rgba(15,23,42,0.06);
    border:1px solid #e2e8f0;
}

/* TOP */

.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
}

/* NAME */

.item-name{
    flex:1;
    font-size:16px;
    font-weight:700;
    line-height:1.5;
    color:#111827;
    word-break:break-word;
}

/* RIGHT */

.right{
    display:flex;
    align-items:center;
    gap:10px;
}

/* RATE */

.rate{
    width:82px;
    border:none;
    outline:none;
    background:#eef2ff;
    border-radius:14px;
    padding:10px;
    text-align:center;
    font-size:15px;
    font-weight:700;
    color:#312e81;
    font-family:'Poppins',sans-serif;
}

/* REMOVE */

.del{
    color:#ef4444;
    font-size:24px;
    font-weight:700;
    cursor:pointer;
    line-height:1;
}

/* BOTTOM */

.bottom{
    margin-top:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-left:24px;
}

/* QTY */

.qty{
    background:
        linear-gradient(
            135deg,
            #eef2ff,
            #e0e7ff
        );
    color:#4338ca;
    padding:7px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
}

/* TOTAL */

.total{
    font-size:20px;
    font-weight:800;
    color:#16a34a;
}

/* FOOTER */

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:18px;
    text-align:center;
    color:white;
    font-size:24px;
    font-weight:800;
    background:
        linear-gradient(
            135deg,
            #4f46e5,
            #7c3aed
        );
    border-radius:24px 24px 0 0;
    box-shadow:
        0 -10px 24px rgba(79,70,229,0.25);
}

</style>

</head>

<body>

<div class="header">सीताराम</div>

<div class="sub">
Smart Market Billing
</div>

<!-- INPUT -->

<div class="input-box">

<textarea id="input"
placeholder="aata 5kg
chawal 2kg
haldi powder 500g"></textarea>

<!-- SUGGESTIONS -->

<div class="suggestions"
id="suggestions"></div>

<button class="add-btn"
onclick="addItems()">

+ Add Items

</button>

</div>

<!-- SUMMARY -->

<div class="summary">

<div>
Total Items:
<span id="count">0</span>
</div>

</div>

<!-- TABLE HEADER -->

<div class="table-header"
id="thead">

    <div class="header-top">
        <div>ITEM</div>
        <div>RATE</div>
    </div>

    <div class="header-bottom">
        <div>QTY</div>
        <div>TOTAL</div>
    </div>

</div>

<!-- LIST -->

<div id="list"></div>

<!-- FOOTER -->

<div class="footer">

₹<span id="grand">0</span>

</div>

<script>

/* ITEMS */

let items = [];

/* DYNAMIC SUGGESTIONS */

let suggestionItems = [];

const savedSuggestions =
    localStorage.getItem(
        "marketSuggestions"
    );

if(savedSuggestions){

    suggestionItems =
        JSON.parse(savedSuggestions);
}

/* RENDER SUGGESTIONS */

function renderSuggestions(){

    const suggestionBox =
        document.getElementById(
            "suggestions"
        );

    if(!suggestionBox) return;

    suggestionBox.innerHTML = "";

    suggestionItems.forEach(item=>{

        suggestionBox.innerHTML += `

        <div class="suggestion"
            onclick="addSuggestion('${item}')">

            ${item}

        </div>

        `;
    });
}

/* SAVE SUGGESTION */

function saveSuggestion(itemText){

    if(
        !suggestionItems.includes(itemText)
    ){

        suggestionItems.unshift(itemText);

        suggestionItems =
            suggestionItems.slice(0,15);

        localStorage.setItem(

            "marketSuggestions",

            JSON.stringify(
                suggestionItems
            )

        );

        renderSuggestions();
    }
}

/* ADD SUGGESTION */

function addSuggestion(text){

    const textarea =
        document.getElementById("input");

    if(textarea.value.trim() !== ""){

        textarea.value +=
            "\n" + text;

    }else{

        textarea.value = text;
    }
}

/* CAPITALIZE */

function capitalizeWords(text){

    return text
        .toLowerCase()
        .split(" ")
        .map(word =>

            word.charAt(0)
            .toUpperCase()

            +

            word.slice(1)

        )
        .join(" ");
}

/* ADD ITEMS */

function addItems(){

    const text =
        document
        .getElementById("input")
        .value
        .trim();

    if(!text) return;

    text
    .split("\n")
    .forEach(line=>{

        let parts =
            line.trim().split(" ");

        let qty =
            parts.pop();

        let name =
            capitalizeWords(
                parts.join(" ")
            );

        if(!name || !qty) return;

        let existing =
            items.find(i=>

                i.name.toLowerCase()
                ===
                name.toLowerCase()

            );

        if(existing){

            existing.qty = qty;

        }else{

            items.push({

                name,
                qty,
                rate:0,
                total:0

            });

            saveSuggestion(
                name + " " + qty
            );
        }

    });

    document
        .getElementById("input")
        .value = "";

    document
        .getElementById("thead")
        .style.display = "block";

    renderItems();
}

/* CALCULATE */

function calculate(item){

    let qtyValue = 0;

    if(item.qty.includes("kg")){

        qtyValue =
            parseFloat(
                item.qty.replace("kg","")
            );

    }
    else if(item.qty.includes("g")){

        qtyValue =
            parseFloat(
                item.qty.replace("g","")
            ) / 1000;
    }
    else{

        qtyValue =
            parseFloat(item.qty);
    }

    item.total =
        qtyValue * (item.rate || 0);
}

/* UPDATE RATE */

function updateRate(index,value){

    items[index].rate =
        Number(value);

    calculate(items[index]);

    document
        .getElementById(
            "total-"+index
        )
        .innerText =

        "₹" +
        items[index]
        .total
        .toFixed(0);

    updateGrand();
}

/* RENDER ITEMS */

function renderItems(){

    let html = "";

    items.forEach((item,index)=>{

        calculate(item);

        html += `

        <div class="card">

            <div class="top">

                <div class="item-name">

                    ${index+1}.
                    ${item.name}

                </div>

                <div class="right">

                    <input class="rate" type="number"
                        value="${item.rate || ''}"
                        oninput="updateRate(${index},this.value)">

                    <div class="del"
                        onclick="removeItem(${index})">

                        ✕

                    </div>

                </div>

            </div>

            <div class="bottom">

                <div class="qty">

                    ${item.qty}

                </div>

                <div class="total"
                    id="total-${index}">

                    ₹${item.total.toFixed(0)}

                </div>

            </div>

        </div>

        `;
    });

    document
        .getElementById("list")
        .innerHTML = html;

    document
        .getElementById("count")
        .innerText =
        items.length;

    updateGrand();
}

/* GRAND TOTAL */

function updateGrand(){

    let total =
        items.reduce(

            (sum,item)=>

            sum + item.total,

            0

        );

    document
        .getElementById("grand")
        .innerText =
        total.toFixed(0);
}

/* REMOVE */

function removeItem(index){

    items.splice(index,1);

    if(items.length === 0){

        document
            .getElementById("thead")
            .style.display = "none";
    }

    renderItems();
}

/* PAGE LOAD */

window.onload = function(){

    renderSuggestions();

};

</script>

</body>
</html>
