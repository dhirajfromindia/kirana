<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>सीताराम मार्केट लिस्ट</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@500;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
    margin:0;
    padding:14px;
    padding-bottom:120px;
    background:#eef2ff;
    font-family:'Poppins',sans-serif;
}

.sitaram{
    text-align:center;
    font-family:'Noto Sans Devanagari';
    font-size:34px;
    font-weight:700;
    color:#ea580c;
}

.sub-title{
    text-align:center;
    color:#64748b;
    font-size:14px;
    margin-bottom:16px;
}

.input-box{
    background:white;
    padding:16px;
    border-radius:18px;
}

textarea{
    width:100%;
    height:110px;
    border:none;
    outline:none;
    resize:none;
    border-radius:14px;
    background:#f8faff;
    padding:14px;
}

.add-btn{
    width:100%;
    margin-top:14px;
    padding:15px;
    border:none;
    border-radius:14px;
    font-weight:600;
    color:white;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.summary{
    margin-top:14px;
    display:flex;
    justify-content:space-between;
    font-weight:600;
    color:#4f46e5;
}

.bill-box{
    margin-top:14px;
    background:white;
    border-radius:18px;
    overflow:hidden;
}

.table-header{
    display:grid;
    grid-template-columns:45px 1.5fr 70px 80px 90px 36px;
    background:#4f46e5;
    color:white;
    padding:12px;
    font-size:12px;
    font-weight:700;
}

.row{
    display:grid;
    grid-template-columns:45px 1.5fr 70px 80px 90px 36px;
    gap:6px;
    padding:12px;
    border-bottom:1px solid #eef2ff;
    align-items:center;
}

.serial{
    width:30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#eef2ff;
    border-radius:50%;
    font-weight:700;
}

.item-name{
    font-weight:600;
    word-break:break-word;
}

.qty{
    text-align:center;
    background:#eef2ff;
    padding:6px;
    border-radius:8px;
    font-size:12px;
}

.rate-input{
    width:100%;
    text-align:center;
    border:none;
    outline:none;
    padding:8px;
    border-radius:8px;
    background:#f8fafc;
}

.total{
    text-align:right;
    font-weight:700;
    color:#16a34a;
}

.delete-btn{
    width:28px;
    height:28px;
    border:none;
    border-radius:6px;
    background:#ef4444;
    color:white;
}

.grand-total{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    text-align:center;
    padding:16px;
    font-size:22px;
    font-weight:700;
}

</style>

</head>

<body>

<div class="sitaram">सीताराम</div>
<div class="sub-title">Smart Billing System</div>

<div class="input-box">

<textarea id="bulkInput" placeholder="aata 5kg
chawal 4kg
haldi 300g"></textarea>

<button class="add-btn" onclick="addBulkItems()">+ Add Items</button>

</div>

<div class="summary">
    <div>Total Items: <span id="itemCount">0</span></div>
</div>

<div class="bill-box">

<div class="table-header" id="tableHeader" style="display:none;">
    <div>#</div>
    <div>ITEM</div>
    <div>QTY</div>
    <div>RATE</div>
    <div>TOTAL</div>
    <div></div>
</div>

<div id="items"></div>

</div>

<div class="grand-total">
Total ₹<span id="grandTotal">0</span>
</div>

<script>

let items = [];

function addBulkItems(){

    const text = document.getElementById("bulkInput").value.trim();
    if(!text) return;

    text.split("\n").forEach(line => {

        let parts = line.trim().split(" ");
        let qty = parts.pop();
        let name = parts.join(" ");

        if(!name || !qty) return;

        let existing = items.find(i =>
            i.name.toLowerCase() === name.toLowerCase()
        );

        if(existing){
            existing.qty = qty;
        }else{
            items.push({name, qty, rate:0, total:0});
        }
    });

    document.getElementById("bulkInput").value = "";
    renderItems();
}

/* ⭐ FIXED: NO FULL RE-RENDER ON TYPING */
function updateRate(index, value){

    const item = items[index];
    item.rate = Number(value);

    let qtyValue = 0;

    if(item.qty.includes("kg")){
        qtyValue = parseFloat(item.qty.replace("kg",""));
    }
    else if(item.qty.includes("g")){
        qtyValue = parseFloat(item.qty.replace("g","")) / 1000;
    }
    else{
        qtyValue = parseFloat(item.qty);
    }

    item.total = qtyValue * item.rate;

    document.getElementById("total-" + index).innerText =
        "₹" + item.total.toFixed(0);

    updateGrandTotal();
}

function renderItems(){

    const container = document.getElementById("items");
    const header = document.getElementById("tableHeader");

    document.getElementById("itemCount").innerText = items.length;

    if(items.length === 0){
        header.style.display = "none";
        container.innerHTML = "";
        updateGrandTotal();
        return;
    }

    header.style.display = "grid";

    let html = "";

    items.forEach((item,i)=>{

        html += `
        <div class="row">

            <div class="serial">${i+1}</div>

            <div class="item-name">${item.name}</div>

            <div class="qty">${item.qty}</div>

            <input class="rate-input"
                inputmode="numeric"
                value="${item.rate || ''}"
                oninput="updateRate(${i},this.value)">

            <div class="total" id="total-${i}">
                ₹${item.total.toFixed(0)}
            </div>

            <button class="delete-btn" onclick="removeItem(${i})">✕</button>

        </div>`;
    });

    container.innerHTML = html;

    updateGrandTotal();
}

function updateGrandTotal(){

    let total = items.reduce((s,i)=>s+i.total,0);
    document.getElementById("grandTotal").innerText = total.toFixed(0);
}

function removeItem(i){
    items.splice(i,1);
    renderItems();
}

</script>

</body>
</html>
