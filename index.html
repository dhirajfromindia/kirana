<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>सीताराम</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:16px;
    padding-bottom:140px;
    background:
        linear-gradient(
            180deg,
            #eef2ff 0%,
            #f8fafc 100%
        );
    font-family:'Poppins',sans-serif;
}

/* HEADER */

.header{
    text-align:center;
    font-size:34px;
    font-weight:800;
    color:#ea580c;
    margin-top:8px;
    letter-spacing:1px;
}

.sub{
    text-align:center;
    color:#64748b;
    font-size:13px;
    margin-bottom:18px;
}

/* INPUT BOX */

.input-box{
    background:white;
    padding:14px;
    border-radius:22px;
    box-shadow:
        0 8px 20px rgba(99,102,241,0.08);
}

textarea{
    width:100%;
    height:100px;
    border:none;
    outline:none;
    resize:none;
    padding:14px;
    border-radius:16px;
    background:#f8faff;
    font-size:14px;
    color:#111827;
}

/* BUTTON */

.add-btn{
    width:100%;
    margin-top:12px;
    padding:15px;
    border:none;
    border-radius:16px;
    background:
        linear-gradient(
            135deg,
            #4f46e5,
            #7c3aed
        );
    color:white;
    font-size:15px;
    font-weight:700;
    box-shadow:
        0 6px 16px rgba(79,70,229,0.3);
}

/* SUMMARY */

.summary{
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 6px;
    color:#4338ca;
    font-weight:700;
}

/* HEADER */

.table-header{
    display:none;
    margin-top:14px;
    background:
        linear-gradient(
            135deg,
            #4338ca,
            #6d28d9
        );
    color:white;
    padding:14px 16px;
    border-radius:18px;
    box-shadow:
        0 6px 16px rgba(67,56,202,0.2);
}

.header-top,
.header-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-top{
    font-size:13px;
    font-weight:700;
}

.header-bottom{
    margin-top:7px;
    font-size:11px;
    opacity:0.9;
}

/* CARD */

.card{
    margin-top:12px;
    background:white;
    border-radius:22px;
    padding:14px;
    box-shadow:
        0 8px 20px rgba(15,23,42,0.06);
    border:1px solid #eef2ff;
}

/* TOP */

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

/* NAME */

.item-name{
    flex:1;
    font-size:16px;
    font-weight:700;
    color:#111827;
    line-height:1.4;
    word-break:break-word;
}

/* RIGHT */

.right{
    display:flex;
    align-items:center;
    gap:10px;
}

/* RATE */

.rate{
    width:78px;
    border:none;
    outline:none;
    background:#eef2ff;
    padding:9px;
    border-radius:12px;
    text-align:center;
    font-weight:700;
    font-size:15px;
    color:#312e81;
    box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.04);
}

/* DELETE */

.del{
    color:#ef4444;
    font-size:22px;
    font-weight:900;
    cursor:pointer;
    transition:0.2s;
}

.del:active{
    transform:scale(0.9);
}

/* BOTTOM */

.bottom{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-left:24px;
}

/* QTY */

.qty{
    background:#eef2ff;
    color:#4338ca;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
}

/* TOTAL */

.total{
    font-size:18px;
    font-weight:800;
    color:#16a34a;
}

/* FOOTER */

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:18px;
    background:
        linear-gradient(
            135deg,
            #4f46e5,
            #7c3aed
        );
    color:white;
    text-align:center;
    font-size:22px;
    font-weight:800;
    box-shadow:
        0 -8px 20px rgba(79,70,229,0.25);
    border-radius:22px 22px 0 0;
}

</style>

</head>

<body>

<div class="header">सीताराम</div>

<div class="sub">
Smart Market Billing
</div>

<div class="input-box">

<textarea id="input"
placeholder="aata 5kg
chawal 4kg
haldi powder 500g"></textarea>

<button class="add-btn"
onclick="addItems()">

+ Add Items

</button>

</div>

<div class="summary">

<div>
Total Items:
<span id="count">0</span>
</div>

</div>

<!-- HEADER -->

<div class="table-header"
id="thead">

    <div class="header-top">
        <div>ITEM</div>
        <div>RATE</div>
    </div>

    <div class="header-bottom">
        <div>QTY</div>
        <div>TOTAL</div>
    </div>

</div>

<!-- LIST -->

<div id="list"></div>

<!-- FOOTER -->

<div class="footer">

Total ₹<span id="grand">0</span>

</div>

<script>

let items = [];

/* CAPITALIZE */

function capitalizeWords(text){

    return text
        .toLowerCase()
        .split(" ")
        .map(word =>

            word.charAt(0).toUpperCase() +
            word.slice(1)

        )
        .join(" ");
}

/* ADD ITEMS */

function addItems(){

    const text =
        document
        .getElementById("input")
        .value
        .trim();

    if(!text) return;

    text
    .split("\n")
    .forEach(line=>{

        let parts =
            line
            .trim()
            .split(" ");

        let qty =
            parts.pop();

        let name =
            capitalizeWords(
                parts.join(" ")
            );

        if(!name || !qty) return;

        let existing =
            items.find(i=>

                i.name.toLowerCase()
                ===
                name.toLowerCase()

            );

        if(existing){

            existing.qty = qty;

        }else{

            items.push({

                name,
                qty,
                rate:0,
                total:0

            });
        }

    });

    document
        .getElementById("input")
        .value = "";

    document
        .getElementById("thead")
        .style.display = "block";

    renderItems();
}

/* CALCULATE */

function calculate(item){

    let qtyValue = 0;

    if(item.qty.includes("kg")){

        qtyValue =
            parseFloat(
                item.qty.replace("kg","")
            );

    }else{

        qtyValue =
            parseFloat(
                item.qty.replace("g","")
            ) / 1000;
    }

    item.total =
        qtyValue * (item.rate || 0);
}

/* RATE UPDATE */

function updateRate(index,value){

    items[index].rate =
        Number(value);

    calculate(items[index]);

    document
        .getElementById(
            "total-"+index
        )
        .innerText =

        "₹" +
        items[index]
        .total
        .toFixed(0);

    updateGrand();
}

/* RENDER */

function renderItems(){

    let html = "";

    items.forEach((item,index)=>{

        calculate(item);

        html += `

        <div class="card">

            <!-- TOP -->

            <div class="top">

                <div class="item-name">

                    ${index+1}.
                    ${item.name}

                </div>

                <div class="right">

                    <input class="rate" type="number"
                        value="${item.rate || ''}"
                        oninput="updateRate(${index},this.value)">

                    <div class="del"
                        onclick="removeItem(${index})">

                        ✕

                    </div>

                </div>

            </div>

            <!-- BOTTOM -->

            <div class="bottom">

                <div class="qty">

                    ${item.qty}

                </div>

                <div class="total"
                    id="total-${index}">

                    ₹${item.total.toFixed(0)}

                </div>

            </div>

        </div>

        `;
    });

    document
        .getElementById("list")
        .innerHTML = html;

    document
        .getElementById("count")
        .innerText =
        items.length;

    updateGrand();
}

/* GRAND TOTAL */

function updateGrand(){

    let total =
        items.reduce(

            (sum,item)=>

            sum + item.total,

            0

        );

    document
        .getElementById("grand")
        .innerText =
        total.toFixed(0);
}

/* REMOVE */

function removeItem(index){

    items.splice(index,1);

    if(items.length === 0){

        document
            .getElementById("thead")
            .style.display = "none";
    }

    renderItems();
}

</script>

</body>
</html>
